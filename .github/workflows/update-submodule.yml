name: Update submodule pointer in computer

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  update-submodule:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout computer
        uses: actions/checkout@v4
        with:
          repository: kortix-ai/computer
          token: ${{ secrets.SUBMODULE_UPDATE_PAT }}
          submodules: false
          fetch-depth: 1

      - name: Update kortix-ocx-registry pointer
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          NEW_SHA="${{ github.sha }}"
          echo "Updating kortix-ocx-registry pointer to $NEW_SHA"

          # Update the gitlink directly
          git update-index --cacheinfo 160000,${NEW_SHA},packages/kortix-ocx-registry

          git diff --cached --quiet && echo "Already up to date" && exit 0

          git commit -m "chore: update kortix-ocx-registry submodule to ${NEW_SHA:0:7}"
          git push
